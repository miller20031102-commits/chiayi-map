<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>嘉義今天去哪玩｜嘉義美食景點地圖</title>
  <meta name="description" content="嘉義吃喝玩樂地圖，整理嘉義美食、景點、咖啡廳、約會地點與晚上可以去的地方。" />

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <h1>嘉義今天去哪玩？</h1>
    <p>整理嘉義美食、景點、咖啡廳、約會地點與晚上可以去的地方</p>
  </header>

  <section class="filters">
    <button data-category="約會">💕 約會</button>
<button data-category="晚上">🌙 晚上</button>
<button data-category="火雞肉飯">🍚 火雞肉飯</button>
<button data-category="甜點">🍰 甜點</button>
<button data-category="早午餐">🍳 早午餐</button>
<button data-category="宵夜">🌃 宵夜</button>
<button data-category="老宅咖啡">☕ 老宅咖啡</button>
<button data-category="酒吧">🍺 酒吧</button>
<button data-category="撞球">🎱 撞球</button>
<button data-category="桌遊">🎲 桌遊</button>
<button data-category="KTV">🎤 KTV</button>
<button data-category="火鍋">🍲 火鍋</button>
<button data-category="燒肉">🥩 燒肉</button>
<button data-category="下午茶">🧁 下午茶</button>
<button data-category="親子">🧸 親子</button>
<button data-category="寵物友善">🐶 寵物友善</button>
<button data-category="雨天">☔ 雨天</button>
  </section>
  <section class="exact-search-box">
    <input
        id="exactSearchInput"
        placeholder="🍜 今天想吃什麼？"
    >

    <button id="exactSearchBtn">
        🔍 找店
    </button>
</section>
 
  <main>
    <div id="map"></div>
   <section id="rankingBox" class="ranking-box">
    <button id="rankingToggle" class="ranking-toggle">
        🔥 TOP 5 ▲
    </button>

    <div class="ranking-legend">
        <div>👑 第一名</div>
        <div>⭐ 第二名</div>
        <div>💎 第三名</div>
        <div>🏅 其他名次</div>
    </div>

    <ol id="rankingList"></ol>
</section>

    <section id="place-card" class="place-card">
      <h2>點選地圖上的地點</h2>
      <p>會顯示推薦理由、分類、Google Maps、IG 和 TikTok 搜尋。</p>
    </section>
  </main>

  <footer>
    <p>© 2026 嘉義今天去哪玩</p>
  </footer>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="script.js"></script>
</body>
</html>
